name: PR Validation

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  lint_and_test:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: "stable"

      - name: Install dependencies
        run: |
          flutter pub get
          cd example && flutter pub get

      - name: Prevent lint ignores
        run: |
          if grep -rnw 'lib/' 'test/' -e 'ignore_for_file'; then
            echo "::error::Using 'ignore_for_file' to bypass lint rules is strictly prohibited. Please fix the underlying lint issues."
            exit 1
          fi

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test

  android_build:
    name: Android Build Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: "zulu"
          java-version: "17"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: "stable"

      - name: Install dependencies
        run: |
          flutter pub get
          cd example && flutter pub get

      - name: Build Android Example
        working-directory: example
        run: flutter build apk --release

  ios_spm_build:
    name: iOS SPM Build Check
    runs-on: macos-15
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: "stable"

      - name: Install dependencies
        run: |
          flutter pub get
          cd example && flutter pub get

      - name: Strip CocoaPods and Build SPM
        working-directory: example
        run: |
          cd ios
          pod deintegrate
          rm -rf Podfile.lock Pods/
          cd ..
          flutter build ios --no-codesign

  pub_publish_check:
    name: Pub.dev Publishing Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: "stable"

      - name: Install dependencies
        run: flutter pub get

      - name: Verify pub.dev publishing
        run: flutter pub publish --dry-run

  macos_build:
    name: macOS Build Check
    runs-on: macos-15
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: "stable"

      - name: Install dependencies
        run: |
          flutter pub get
          cd example && flutter pub get

      - name: Build macOS Example
        working-directory: example
        run: flutter build macos --debug

  windows_build:
    name: Windows Build Check
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: "stable"

      - name: Install dependencies
        run: |
          flutter pub get
          cd example && flutter pub get

      - name: Build Windows Example
        working-directory: example
        run: flutter build windows --debug

  web_build:
    name: Web Build Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: "stable"

      - name: Install dependencies
        run: |
          flutter pub get
          cd example && flutter pub get

      - name: Build Web Example
        working-directory: example
        run: flutter build web --release
